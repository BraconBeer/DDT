<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Бестиарий - DDT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="sidebar.css"> 
    <link rel="stylesheet" href="bestiary.css">
    <style>
        /* Дополнительные стили для изображений в плитках, чтобы они выглядели аккуратно и единообразно */
        .tile-icon-img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 50%;
            background-color: #2c3b23;
            border: 2px solid #ecd8b2;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .creature-tile:hover .tile-icon-img {
            transform: scale(1.05);
            border-color: #faa722;
        }
        
        /* Для мобильных уменьшаем размер иконок */
        @media (max-width: 650px) {
            .tile-icon-img {
                width: 50px;
                height: 50px;
            }
        }
        
        /* Стили для поля поиска — улучшаем читаемость */
        .search-input {
            color: #ecd8b2;
        }
        .search-input::placeholder {
            color: #ecd8b2;
            opacity: 0.7;
        }
        
        /* Адаптация для сетки, чтобы картинки не ломались */
        .compact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        
        .creature-tile {
            background-color: #2c3b23;
            border: 1px solid #ecd8b2;
            border-radius: 24px;
            padding: 16px 12px;
            text-align: center;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .tile-name {
            font-size: 1.05rem;
            font-weight: bold;
            color: #ecd8b2;
        }
        
        .tile-details {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
        }
        
        .tile-type {
            background-color: #51161a;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #ecd8b2;
            display: inline-block;
        }
        
        .tile-size {
            font-size: 0.8rem;
            color: #82915c;
        }
        
        .tile-cr {
            background-color: #faa722;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #2c3b23;
        }
        
        /* Адаптив для очень маленьких экранов */
        @media (max-width: 480px) {
            .compact-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }
            .tile-name {
                font-size: 0.9rem;
            }
        }
        
        /* Оформление активных фильтров */
        .type-btn.active {
            background-color: #ecd8b2;
            color: #2c3b23;
            border-color: #ecd8b2;
        }
    </style>
</head>
<body>
    <div class="navbar-strip"></div>
    
    <div class="page-wrapper">
        <div class="top-bar"></div>
        <a href="../index.html" class="logo-flag"></a>

        <main class="main-content">
            <div class="container">
                <div class="bestiary-content">
                    <!-- Заголовок и поиск в одной строке -->
                    <div class="bestiary-header">
                        <div class="title-block">
                            <h1>Бестиарий</h1>
                        </div>
                        <div class="search-bar">
                            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск монстров...">
                        </div>
                    </div>

                    <!-- Фильтры типажей -->
                    <div class="type-filters" id="filterButtons">
                        <button class="type-btn active" data-type="all">Все</button>
                        <button class="type-btn" data-type="dragon">Дракон</button>
                        <button class="type-btn" data-type="undead">Нежить</button>
                        <button class="type-btn" data-type="humanoid">Гуманоид</button>
                        <button class="type-btn" data-type="aberration">Аберрация</button>
                        <button class="type-btn" data-type="fiend">Исчадие</button>
                        <button class="type-btn" data-type="beast">Зверь</button>
                        <button class="type-btn" data-type="plant">Растение</button>
                        <button class="type-btn" data-type="elemental">Элементаль</button>
                        <button class="type-btn" data-type="giant">Великан</button>
                    </div>

                    <!-- Сетка существ -->
                    <div class="compact-grid" id="creatures-grid">
                        <!-- Данные подгружаются через JS -->
                    </div>

                    <!-- Пагинация (декоративная, позже можно оживить) -->
                    <div class="pagination">
                        <a href="#" class="page-btn">←</a>
                        <a href="#" class="page-btn active">1</a>
                        <a href="#" class="page-btn">2</a>
                        <a href="#" class="page-btn">3</a>
                        <a href="#" class="page-btn">4</a>
                        <a href="#" class="page-btn">→</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ========================
        // РАСШИРЕННАЯ БАЗА СУЩЕСТВ С ПУТЯМИ К ИЗОБРАЖЕНИЯМ
        // ========================
        // Теперь у каждого существа есть поле "imgSrc" — путь к картинке.
        // Для красного дракона используем ТУ ЖЕ картинку, что и на странице RedDragon.webp
        const creatures = [
            { 
                name: "Красный дракон", 
                type: "dragon", 
                typeName: "Дракон", 
                size: "Большой", 
                cr: 10, 
                imgSrc: "RedDragon.webp",   // Та самая картинка из страницы дракона
                url: "red-dragon.html",
                alt: "Красный дракон"
            },
            { 
                name: "Лич", 
                type: "undead", 
                typeName: "Нежить", 
                size: "Средний", 
                cr: 21, 
                imgSrc: "https://images.unsplash.com/photo-1509557831724-6e1d3a2e4b3f?w=150&h=150&fit=crop", // заглушка стилизованная (можно заменить)
                url: "coming-soon.html",
                alt: "Лич"
            },
            { 
                name: "Бихолдер", 
                type: "aberration", 
                typeName: "Аберрация", 
                size: "Большой", 
                cr: 13, 
                imgSrc: "https://cdn.pixabay.com/photo/2020/04/08/06/23/eye-5015412_640.png",
                url: "coming-soon.html",
                alt: "Бихолдер"
            },
            { 
                name: "Тролль", 
                type: "giant", 
                typeName: "Великан", 
                size: "Большой", 
                cr: 5, 
                imgSrc: "https://cdn-icons-png.flaticon.com/512/2563/2563770.png",
                url: "coming-soon.html",
                alt: "Тролль"
            },
            { 
                name: "Вервольф", 
                type: "humanoid", 
                typeName: "Гуманоид", 
                size: "Средний", 
                cr: 3, 
                imgSrc: "https://cdn-icons-png.flaticon.com/512/1995/1995572.png",
                url: "coming-soon.html",
                alt: "Вервольф"
            },
            { 
                name: "Иллитид", 
                type: "aberration", 
                typeName: "Аберрация", 
                size: "Средний", 
                cr: 7, 
                imgSrc: "https://cdn-icons-png.flaticon.com/512/2990/2990370.png",
                url: "coming-soon.html",
                alt: "Иллитид"
            },
            { 
                name: "Гигантский паук", 
                type: "beast", 
                typeName: "Зверь", 
                size: "Большой", 
                cr: 1, 
                imgSrc: "https://cdn-icons-png.flaticon.com/512/3378/3378765.png",
                url: "coming-soon.html",
                alt: "Гигантский паук"
            },
            { 
                name: "Миконид", 
                type: "plant", 
                typeName: "Растение", 
                size: "Средний", 
                cr: 0.5, 
                imgSrc: "https://cdn-icons-png.flaticon.com/512/1998/1998609.png",
                url: "coming-soon.html",
                alt: "Миконид"
            },
            { 
                name: "Псевдодракон", 
                type: "dragon", 
                typeName: "Дракон", 
                size: "Крошечный", 
                cr: 0.25, 
                imgSrc: "https://cdn-icons-png.flaticon.com/512/616/616548.png",
                url: "coming-soon.html",
                alt: "Псевдодракон"
            },
            { 
                name: "Хобгоблин", 
                type: "humanoid", 
                typeName: "Гуманоид", 
                size: "Средний", 
                cr: 3, 
                imgSrc: "https://cdn-icons-png.flaticon.com/512/2990/2990427.png",
                url: "coming-soon.html",
                alt: "Хобгоблин"
            },
            { 
                name: "Огр", 
                type: "giant", 
                typeName: "Великан", 
                size: "Большой", 
                cr: 2, 
                imgSrc: "https://cdn-icons-png.flaticon.com/512/1946/1946423.png",
                url: "coming-soon.html",
                alt: "Огр"
            },
            { 
                name: "Призрак", 
                type: "undead", 
                typeName: "Нежить", 
                size: "Средний", 
                cr: 4, 
                imgSrc: "https://cdn-icons-png.flaticon.com/512/3212/3212741.png",
                url: "coming-soon.html",
                alt: "Призрак"
            },
            { 
                name: "Балар", 
                type: "fiend", 
                typeName: "Исчадие", 
                size: "Большой", 
                cr: 19, 
                imgSrc: "https://cdn-icons-png.flaticon.com/512/3303/3303018.png",
                url: "coming-soon.html",
                alt: "Балар"
            },
            { 
                name: "Саламандра", 
                type: "elemental", 
                typeName: "Элементаль", 
                size: "Средний", 
                cr: 5, 
                imgSrc: "https://cdn-icons-png.flaticon.com/512/1900/1900589.png",
                url: "coming-soon.html",
                alt: "Саламандра"
            },
            { 
                name: "Треант", 
                type: "plant", 
                typeName: "Растение", 
                size: "Огромный", 
                cr: 9, 
                imgSrc: "https://cdn-icons-png.flaticon.com/512/2942/2942192.png",
                url: "coming-soon.html",
                alt: "Треант"
            }
        ];

        // Дополнительная локальная картинка-заглушка на случай, если изображение не загрузится
        const fallbackImage = "https://cdn-icons-png.flaticon.com/512/3362/3362647.png";

        // Функция рендеринга существ с учётом фильтра и поискового запроса
        function renderCreatures(filterType = "all", searchQuery = "") {
            const grid = document.getElementById("creatures-grid");
            if (!grid) return;
            
            // Фильтрация по типу
            let filtered = (filterType === "all") ? [...creatures] : creatures.filter(c => c.type === filterType);
            
            // Фильтрация по поисковому запросу (по названию без учёта регистра)
            if (searchQuery.trim() !== "") {
                const lowerQuery = searchQuery.toLowerCase();
                filtered = filtered.filter(creature => creature.name.toLowerCase().includes(lowerQuery));
            }
            
            // Если нет существ, показываем сообщение
            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; background:#2c3b23; border-radius:30px; color:#ecd8b2;">
                                    🐾 Нет существ, соответствующих фильтру. Попробуйте изменить поиск или категорию.
                                  </div>`;
                return;
            }
            
            // Генерируем плитки с изображениями вместо эмодзи
            grid.innerHTML = filtered.map(creature => {
                // Для красного дракона картинка особенная (уже прописана), для остальных — из поля imgSrc
                let imgUrl = creature.imgSrc;
                // Если вдруг у какого-то существа нет imgSrc, ставим плейсхолдер
                if (!imgUrl) {
                    imgUrl = fallbackImage;
                }
                
                return `
                    <a href="${creature.url}" class="creature-tile">
                        <img class="tile-icon-img" src="${imgUrl}" alt="${creature.alt || creature.name}" loading="lazy" onerror="this.src='${fallbackImage}';">
                        <div class="tile-name">${creature.name}</div>
                        <div class="tile-details">
                            <span class="tile-type">${creature.typeName}</span>
                            <span class="tile-size">${creature.size}</span>
                            <span class="tile-cr">Ур. ${creature.cr}</span>
                        </div>
                    </a>
                `;
            }).join("");
        }
        
        // === Реализация поиска и фильтров с синхронизацией ===
        document.addEventListener("DOMContentLoaded", () => {
            // Начальный рендер
            let currentFilter = "all";
            let currentSearch = "";
            
            renderCreatures(currentFilter, currentSearch);
            
            // Получаем все кнопки фильтров
            const filterBtns = document.querySelectorAll(".type-btn");
            const searchInput = document.getElementById("searchInput");
            
            // Функция обновления (рендеринг с учётом текущих значений)
            const updateGrid = () => {
                renderCreatures(currentFilter, currentSearch);
            };
            
            // Обработчики для фильтров
            filterBtns.forEach(btn => {
                btn.addEventListener("click", () => {
                    // Убираем active у всех
                    filterBtns.forEach(b => b.classList.remove("active"));
                    // Добавляем active нажатому
                    btn.classList.add("active");
                    // Получаем тип
                    const newType = btn.getAttribute("data-type");
                    currentFilter = newType;
                    updateGrid();
                });
            });
            
            // Обработчик поиска с debounce для удобства и производительности
            let debounceTimer;
            if (searchInput) {
                searchInput.addEventListener("input", (e) => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => {
                        currentSearch = e.target.value;
                        updateGrid();
                    }, 300);
                });
            }
            
            // Дополнительно: для предотвращения перехода по пагинации (пока статична, просто для стиля)
            const pageBtns = document.querySelectorAll(".page-btn");
            pageBtns.forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.preventDefault();
                    // В будущем здесь можно добавить настоящую пагинацию, если данных будет много
                    // Пока просто имитация, ничего не делает, но не ломает интерфейс
                    if (!btn.classList.contains("active")) {
                        pageBtns.forEach(b => b.classList.remove("active"));
                        btn.classList.add("active");
                        // Можно добавить скролл к сетке
                        document.getElementById("creatures-grid")?.scrollIntoView({ behavior: "smooth", block: "start" });
                    }
                });
            });
        });
    </script>
    
    <!-- Подключаем компоненты (топ-бар, логотип) -->
    <script src="components.js"></script>
</body>
</html>
